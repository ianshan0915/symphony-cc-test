# CI/test services — ephemeral, no volumes persisted
# Usage: docker compose -f docker-compose.test.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: symphony-postgres-test
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: symphony_test
      POSTGRES_PASSWORD: symphony_test
      POSTGRES_DB: symphony_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U symphony_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: symphony-redis-test
    ports:
      - "6379:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
