# .github/workflows/infra-plan.yml
name: Terraform Plan

on:
  pull_request:
    paths:
      - "infrastructure/**"

permissions:
  id-token: write     # OIDC
  contents: read
  pull-requests: write # post plan as PR comment

env:
  AWS_REGION: us-east-1

jobs:
  plan:
    name: "Terraform Plan — ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging]
        include:
          - environment: dev
            tf_dir: infrastructure/terraform/environments/dev
            role_secret: AWS_DEPLOY_ROLE_ARN
          - environment: staging
            tf_dir: infrastructure/terraform/environments/staging
            role_secret: AWS_DEPLOY_ROLE_ARN
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[matrix.role_secret] }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        working-directory: ${{ matrix.tf_dir }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ matrix.tf_dir }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ matrix.tf_dir }}
        run: |
          terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planPath = '${{ matrix.tf_dir }}/plan_output.txt';
            let plan = fs.readFileSync(planPath, 'utf8');

            // Truncate if too long for a GH comment (max 65536 chars)
            const MAX = 60000;
            if (plan.length > MAX) {
              plan = plan.substring(0, MAX) + '\n\n... (truncated)';
            }

            const exitCode = '${{ steps.plan.outcome }}';
            const icon = exitCode === 'success' ? '✅' : '❌';

            const body = [
              `### ${icon} Terraform Plan — \`${{ matrix.environment }}\``,
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```terraform',
              plan,
              '```',
              '',
              '</details>',
              '',
              `*Triggered by @${{ github.actor }} in #${{ github.event.pull_request.number }}*`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1
