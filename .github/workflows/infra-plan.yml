# .github/workflows/infra-plan.yml
name: Terraform Plan

on:
  pull_request:
    paths:
      - "infrastructure/**"

permissions:
  id-token: write     # OIDC
  contents: read
  pull-requests: write # post plan as PR comment

env:
  AWS_REGION: us-east-1
  TF_DIR: infrastructure/terraform/environments/dev

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planPath = '${{ env.TF_DIR }}/plan_output.txt';
            let plan = fs.readFileSync(planPath, 'utf8');

            // Truncate if too long for a GH comment (max 65536 chars)
            const MAX = 60000;
            if (plan.length > MAX) {
              plan = plan.substring(0, MAX) + '\n\n... (truncated)';
            }

            const exitCode = '${{ steps.plan.outcome }}';
            const icon = exitCode === 'success' ? '✅' : '❌';

            const body = `### ${icon} Terraform Plan — \`${{ env.TF_DIR }}\`

            <details><summary>Show plan</summary>

            \`\`\`terraform
            ${plan}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} in #${{ github.event.pull_request.number }}*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1
